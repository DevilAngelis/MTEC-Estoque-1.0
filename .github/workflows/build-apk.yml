name: Build APK Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Permissao gradlew
        run: chmod +x android/gradlew

      - name: Criar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/mtec-release.keystore

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: app/mtec-release.keystore
          KEYSTORE_PASSWORD: mtec1234
          KEY_ALIAS: mtec
          KEY_PASSWORD: mtec1234

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MTEC-Estoque
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
