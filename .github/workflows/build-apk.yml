name: Build APK Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Instala dependências
      - name: Instalar dependencias
        run: npm install --legacy-peer-deps --ignore-scripts

      # CRÍTICO: gera www/index.html antes do cap sync
      # Sem este passo o APK abre tela branca
      - name: Preparar www
        run: node copy-web.js

      - name: Verificar www/index.html
        run: |
          if [ ! -f "www/index.html" ]; then
            echo "ERRO: www/index.html nao foi gerado"
            exit 1
          fi
          echo "OK: www/index.html - $(wc -c < www/index.html) bytes"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Permissao gradlew
        run: chmod +x android/gradlew

      # Keystore vem do secret KEYSTORE_BASE64
      # O build.gradle lê KEYSTORE_PASSWORD, KEY_ALIAS e KEY_PASSWORD via System.getenv()
      # Fallback hardcoded no build.gradle: mtec1234 / mtec
      - name: Criar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/mtec-release.keystore

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verificar APK
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "ERRO: APK nao encontrado"
            exit 1
          fi
          echo "OK: APK gerado - $(du -h $APK | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MTEC-Estoque
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
